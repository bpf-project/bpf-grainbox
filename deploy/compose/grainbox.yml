services:
  grainbox-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    environment:
      NODE_ENV: production
      # Upstream Vexa v0.12: gateway is the single entry point
      VEXA_API_URL: ${VEXA_API_URL:-http://vexa-gateway:80}
      # Admin API is now upstream at /admin/* on the gateway (no separate admin-api needed)
      VEXA_ADMIN_API_URL: ${VEXA_ADMIN_API_URL:-http://vexa-gateway:80}
      VEXA_ADMIN_API_KEY: ${VEXA_ADMIN_API_KEY:?VEXA_ADMIN_API_KEY is required}
      AGENT_API_URL: ${AGENT_API_URL:-http://vexa-gateway:80}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://grainbox.easycasual.app}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://grainbox.easycasual.app}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENABLE_GOOGLE_AUTH: ${ENABLE_GOOGLE_AUTH:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_VERSION: ${AI_API_VERSION:-}
      NEXT_PUBLIC_ADMIN_UNLOCK_REQUIRED: ${NEXT_PUBLIC_ADMIN_UNLOCK_REQUIRED:-false}
      # WebSocket URL for real-time transcript streaming
      VEXA_WS_URL: ${VEXA_WS_URL:-ws://vexa-gateway:80}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${GRAINBOX_WEB_PORT:-3001}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - vexa-v012

networks:
  vexa-v012:
    external: true
    name: vexa-v012-grainbox_vexa
